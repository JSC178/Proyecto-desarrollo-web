<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body style="background-color: var(--marfil);">

        <header th:replace="~{sesionIniciada/fragmentos :: header}"></header>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8 col-lg-6">

                    <div class="card shadow border-0" style="border-radius: 15px;">

                        <div class="card-header text-center text-white p-4" style="background-color: var(--azul-petroleo); border-radius: 15px 15px 0 0;">
                            <h3 class="mb-0 fw-bold text-uppercase"><i class="fas fa-calendar-plus me-2"></i> Agendar Cita</h3>
                        </div>

                        <div class="card-body p-5">

                            <form th:action="@{/cita/guardar}" th:object="${cita}" method="POST">

                                <div class="mb-4">
                                    <label for="servicio" class="form-label fw-bold" style="color: var(--azul-petroleo);">¿Qué servicio deseas?</label>
                                    <select class="form-select form-select-lg" id="servicio" name="servicio.idServicio" required>
                                        <option value="" disabled selected>Selecciona un servicio...</option>
                                        <option th:each="s : ${servicios}" 
                                                th:value="${s.idServicio}" 
                                                th:text="${s.nombre} + ' - ₡' + ${#numbers.formatDecimal(s.precio, 0, 'POINT', 0, 'POINT')}">
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-4">
                                    <label for="empleado" class="form-label fw-bold" style="color: var(--azul-petroleo);">Elige a tu profesional</label>
                                    <select class="form-select form-select-lg" id="empleado" name="empleado.idEmpleado" required>
                                        <option value="" disabled selected>Cualquier profesional...</option>
                                        <option th:each="e : ${empleados}" 
                                                th:value="${e.idEmpleado}" 
                                                th:text="${e.nombre} + ' ' + ${e.apellidos}">
                                        </option>
                                    </select>
                                </div>

                                <div class="mb-4">
                                    <label for="fechaHora" class="form-label fw-bold" style="color: var(--azul-petroleo);">Fecha y Hora de la Cita</label>
                                    <input type="datetime-local" class="form-control form-control-lg" id="fechaHora" th:field="*{fechaHora}" required>
                                </div>

                                <div class="d-grid mt-4">
                                    <button type="submit" class="btn btn-lg text-white fw-bold shadow-sm" style="background-color: var(--terracota);">
                                        <i class="fas fa-check-circle me-2"></i> Confirmar Cita
                                    </button>
                                </div>

                            </form>
                        </div>
                    </div>

                </div>
            </div>
        </main>

        <footer th:replace="~{sesionIniciada/fragmentos :: footer}"></footer>

    </body>
</html>
