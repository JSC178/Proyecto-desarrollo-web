<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{general/fragmentos :: head}"></head>

<body>

    <header th:replace="~{general/fragmentos :: header}"></header>

   <main>
        <section class="position-relative vh-100 d-flex flex-column align-items-center justify-content-center text-center overflow-hidden">
            
            <video autoplay loop muted playsinline class="position-absolute w-100 h-100" style="object-fit: cover; z-index: -2;">
                <source th:src="@{/video/inicio.mp4}" type="video/mp4">
                Tu navegador no soporta la etiqueta de video.
            </video>

            <div class="position-absolute w-100 h-100 bg-dark" style="opacity: 0.6; z-index: -1;"></div>

            <div class="position-relative text-white" style="z-index: 1;">
                <h1 class="display-1 fw-bold text-uppercase hero-title">THE LOOK LAB</h1>
                <p class="fs-3 mt-3 hero-subtitle">THE 100%</p>
                
                <a th:href="@{/servicios}" class="btn btn-outline-light btn-lg mt-4 px-5" style="border-radius: 0; letter-spacing: 1px; text-transform: uppercase;">Ver Servicios</a>
            </div>
            
            <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${mensaje}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            
        </section>
    </main>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>

</body>
</html>
