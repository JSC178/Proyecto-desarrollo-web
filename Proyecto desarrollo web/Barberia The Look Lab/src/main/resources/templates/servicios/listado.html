<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body>

        <header th:replace="~{general/fragmentos :: header}"></header>

        <div class="container mt-5">

            <h2 class="mb-4">Historial de Citas</h2>

            <table class="table table-striped">

                <thead>
                    <tr>
                        <th>Fecha</th>
                        <th>Servicio</th>
                        <th>Empleado</th>
                        <th>Estado</th>
                        <th>Acción</th>
                    </tr>
                </thead>

                <tbody>

                    <tr th:each="cita : ${citas}">

                        <td th:text="${cita.fechaHora}"></td>

                        <td th:text="${cita.servicio.nombre}"></td>

                        <td th:text="${cita.empleado.nombre}"></td>

                        <td th:text="${cita.estado}"></td>

                        <td>
                            <a th:href="@{/cita/cancelar/{id}(id=${cita.idCita})}"
                               class="btn btn-danger btn-sm">
                                Cancelar
                            </a>
                        </td>

                    </tr>

                </tbody>

            </table>

        </div>

        <footer th:replace="~{general/fragmentos :: footer}"></footer>

    </body>
</html>
