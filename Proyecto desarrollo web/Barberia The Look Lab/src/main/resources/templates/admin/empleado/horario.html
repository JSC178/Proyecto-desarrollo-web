<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{sesionIniciada/fragmentos :: head}"></head>
    <body style="background-color: var(--marfil);">
        <header th:replace="~{sesionIniciada/fragmentos :: header}"></header>

        <main class="container py-5">
            
            <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show" role="alert">
                <span th:text="${mensaje}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <a th:href="@{/admin/empleado/listado}" class="btn btn-outline-secondary mb-4 fw-bold">
                <i class="fas fa-arrow-left me-2"></i> Volver a Empleados
            </a>

            <div class="row">
                <div class="col-md-4 mb-4">
                    <div class="card shadow border-0" style="border-radius: 15px;">
                        <div class="card-header text-white" style="background-color: var(--azul-petroleo); border-radius: 15px 15px 0 0;">
                            <h5 class="mb-0 fw-bold"><i class="fas fa-plus-circle me-2"></i> Nuevo Turno</h5>
                        </div>
                        <div class="card-body">
                            <form th:action="@{/admin/empleado/horario/guardar}" th:object="${horarioNuevo}" method="POST">
                                <input type="hidden" th:field="*{empleado.idEmpleado}">

                                <div class="mb-3">
                                    <label class="form-label fw-bold">Día</label>
                                    <select class="form-select" th:field="*{diaSemana}" required>
                                        <option value="Lunes">Lunes</option>
                                        <option value="Martes">Martes</option>
                                        <option value="Miércoles">Miércoles</option>
                                        <option value="Jueves">Jueves</option>
                                        <option value="Viernes">Viernes</option>
                                        <option value="Sábado">Sábado</option>
                                        <option value="Domingo">Domingo</option>
                                    </select>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Entrada</label>
                                    <input type="time" class="form-control" th:field="*{horaInicio}" required>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label fw-bold">Salida</label>
                                    <input type="time" class="form-control" th:field="*{horaFin}" required>
                                </div>
                                <button type="submit" class="btn text-white fw-bold w-100" style="background-color: var(--terracota);">Guardar</button>
                            </form>
                        </div>
                    </div>
                </div>

                <div class="col-md-8">
                    <div class="card shadow border-0" style="border-radius: 15px;">
                        <div class="card-header bg-light border-0 py-3">
                            <h4 class="mb-0 fw-bold text-secondary">
                                Horarios de <span th:text="${empleado.nombre + ' ' + empleado.apellidos}" style="color: var(--azul-petroleo);"></span>
                            </h4>
                        </div>
                        <div class="card-body p-0">
                            <table class="table table-hover text-center m-0">
                                <thead class="table-light">
                                    <tr>
                                        <th>Día</th>
                                        <th>Entrada</th>
                                        <th>Salida</th>
                                        <th>Quitar</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="h : ${horarios}">
                                        <td class="fw-bold"><span class="badge bg-secondary px-3" th:text="${h.diaSemana}"></span></td>
                                        <td th:text="${h.horaInicio}"></td>
                                        <td th:text="${h.horaFin}"></td>
                                        <td>
                                            <a th:href="@{/admin/empleado/horario/eliminar/} + ${h.idHorario} + '/' + ${empleado.idEmpleado}" 
                                               class="btn btn-outline-danger btn-sm rounded-circle" 
                                               onclick="return confirm('¿Eliminar este turno?');">
                                                <i class="fas fa-trash-alt"></i>
                                            </a>
                                        </td>
                                    </tr>
                                    <tr th:if="${horarios.empty}">
                                        <td colspan="4" class="py-4 text-muted">Este empleado aún no tiene horarios asignados.</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

        </main>
        <footer th:replace="~{sesionIniciada/fragmentos :: footer}"></footer>
    </body>
</html>
