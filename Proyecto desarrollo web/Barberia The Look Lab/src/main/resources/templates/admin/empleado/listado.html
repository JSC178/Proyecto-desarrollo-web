<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org">
    <head th:replace="~{sesionIniciada/fragmentos :: head}"></head>
    <body style="background-color: var(--marfil);">
        <header th:replace="~{sesionIniciada/fragmentos :: header}"></header>

        <main class="container py-5">
            
            <div th:if="${mensaje}" class="alert alert-success alert-dismissible fade show shadow-sm mb-4" role="alert">
                <i class="fas fa-check-circle me-2"></i> <span th:text="${mensaje}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow border-0" style="border-radius: 15px;">
                <div class="card-header d-flex justify-content-between align-items-center text-white p-4" style="background-color: var(--azul-petroleo); border-radius: 15px 15px 0 0;">
                    <h3 class="mb-0 fw-bold text-uppercase"><i class="fas fa-users me-2"></i> Gestión de Personal</h3>
                    
                    <button type="button" class="btn text-white fw-bold shadow-sm" style="background-color: var(--terracota);" data-bs-toggle="modal" data-bs-target="#modalEmpleado" onclick="limpiarModal()">
                        <i class="fas fa-user-plus me-1"></i> Agregar Empleado
                    </button>
                </div>

                <div class="card-body p-4">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle text-center">
                            <thead class="table-light text-secondary">
                                <tr>
                                    <th>Nombre Completo</th>
                                    <th>Especialidad</th>
                                    <th>Estado</th>
                                    <th>Horarios</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="e : ${empleados}">
                                    <td class="fw-bold" th:text="${e.nombre + ' ' + e.apellidos}"></td>
                                    <td th:text="${e.especialidad}"></td>
                                    <td>
                                        <span class="badge rounded-pill bg-success" th:if="${e.activo}">Activo</span>
                                        <span class="badge rounded-pill bg-danger" th:if="${!e.activo}">Inactivo</span>
                                    </td>
                                    <td>
                                        <a th:href="@{/admin/empleado/horario/} + ${e.idEmpleado}" class="btn btn-sm btn-outline-dark fw-bold">
                                            <i class="fas fa-clock me-1"></i> Gestionar
                                        </a>
                                    </td>
                                    <td>
                                        <button class="btn btn-sm btn-light border shadow-sm" title="Editar"
                                                data-bs-toggle="modal" data-bs-target="#modalEmpleado"
                                                th:data-id="${e.idEmpleado}"
                                                th:data-nombre="${e.nombre}"
                                                th:data-apellidos="${e.apellidos}"
                                                th:data-especialidad="${e.especialidad}"
                                                th:data-activo="${e.activo}"
                                                onclick="editarEmpleado(this)">
                                            <i class="fas fa-edit text-primary"></i>
                                        </button>

                                        <a th:href="@{/admin/empleado/eliminar/} + ${e.idEmpleado}" 
                                           class="btn btn-sm btn-light border shadow-sm ms-1" title="Eliminar"
                                           onclick="return confirm('¿Seguro que deseas eliminar a este profesional? Se borrarán sus horarios.');">
                                            <i class="fas fa-trash-alt text-danger"></i>
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>

        <div class="modal fade" id="modalEmpleado" tabindex="-1" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered">
                <div class="modal-content border-0 shadow-lg">
                    <div class="modal-header text-white" style="background-color: var(--azul-petroleo);">
                        <h5 class="modal-title fw-bold" id="modalTitulo"><i class="fas fa-id-card me-2"></i> Registro de Profesional</h5>
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    
                    <form th:action="@{/admin/empleado/guardar}" th:object="${empleado}" method="POST">
                        
                        <input type="hidden" th:field="*{idEmpleado}" id="inputIdEmpleado">

                        <div class="modal-body p-4">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Nombre</label>
                                    <input type="text" class="form-control" th:field="*{nombre}" id="inputNombre" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Apellidos</label>
                                    <input type="text" class="form-control" th:field="*{apellidos}" id="inputApellidos" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label fw-bold">Especialidad</label>
                                <select class="form-select" th:field="*{especialidad}" id="inputEspecialidad" required>
                                    <option value="" disabled selected>Seleccione...</option>
                                    <option value="Barbero">Barbero</option>
                                    <option value="Estilista">Estilista</option>
                                    <option value="Manicurista">Manicurista</option>
                                    <option value="Especialista en Barbas">Especialista en Barbas</option>
                                </select>
                            </div>

                            <div class="form-check form-switch mt-3">
                                <input class="form-check-input" type="checkbox" th:field="*{activo}" id="inputActivo">
                                <label class="form-check-label fw-bold" for="inputActivo">Empleado Activo</label>
                            </div>
                        </div>
                        
                        <div class="modal-footer bg-light">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn text-white fw-bold" style="background-color: var(--terracota);" id="btnGuardar">
                                <i class="fas fa-save me-1"></i> Guardar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>

        <footer th:replace="~{sesionIniciada/fragmentos :: footer}"></footer>

        <script>
            // Cuando le dan clic al lápiz de editar
            function editarEmpleado(boton) {
                // Cambiar textos visuales del Modal
                document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-user-edit me-2"></i> Editar Profesional';
                document.getElementById('btnGuardar').innerHTML = '<i class="fas fa-sync-alt me-1"></i> Actualizar Datos';

                // Llenar los inputs con la información que el botón trae guardada en los "data-"
                document.getElementById('inputIdEmpleado').value = boton.getAttribute('data-id');
                document.getElementById('inputNombre').value = boton.getAttribute('data-nombre');
                document.getElementById('inputApellidos').value = boton.getAttribute('data-apellidos');
                document.getElementById('inputEspecialidad').value = boton.getAttribute('data-especialidad');
                
                // Marcar o desmarcar el switch de activo
                document.getElementById('inputActivo').checked = (boton.getAttribute('data-activo') === 'true');
            }

            // Cuando le dan clic al botón de agregar nuevo
            function limpiarModal() {
                // Cambiar textos visuales al original
                document.getElementById('modalTitulo').innerHTML = '<i class="fas fa-id-card me-2"></i> Registro de Profesional';
                document.getElementById('btnGuardar').innerHTML = '<i class="fas fa-save me-1"></i> Registrar Empleado';

                // Limpiar todos los campos
                document.getElementById('inputIdEmpleado').value = '';
                document.getElementById('inputNombre').value = '';
                document.getElementById('inputApellidos').value = '';
                document.getElementById('inputEspecialidad').value = '';
                document.getElementById('inputActivo').checked = true; // Por defecto activo
            }
        </script>
    </body>
</html>
