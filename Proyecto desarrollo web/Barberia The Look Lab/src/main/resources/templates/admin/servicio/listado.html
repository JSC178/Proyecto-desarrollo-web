<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body style="background-color: var(--marfil);">

        <header th:replace="~{sesionIniciada/fragmentos :: header}"></header>

        <main class="container py-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold" style="color: var(--azul-petroleo);">
                    <i class="fas fa-cut me-2"></i> Gestión de Servicios
                </h2>
                <a th:href="@{/admin/servicio/nuevo}" class="btn text-white fw-bold shadow-sm" style="background-color: var(--terracota);">
                    <i class="fas fa-plus me-1"></i> Nuevo Servicio
                </a>
            </div>

            <div class="card shadow-sm border-0" style="border-radius: 15px;">
                <div class="card-body p-0">
                    <div class="table-responsive">
                        
                        <table class="table table-hover align-middle mb-0 text-center">
                            <thead class="text-white" style="background-color: var(--azul-petroleo);">
                                <tr>
                                    <th class="py-3 px-4">ID</th>
                                    <th class="py-3 px-4">Nombre</th>
                                    <th class="py-3 px-4">Duración (Min)</th>
                                    <th class="py-3 px-4">Precio</th>
                                    <th class="py-3 px-4">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="s : ${servicios}">
                                    <td class="py-3 fw-bold" th:text="${s.idServicio}"></td>
                                    <td class="py-3" th:text="${s.nombre}"></td>
                                    <td class="py-3" th:text="${s.duracionMinutos} + ' min'"></td>
                                    <td class="py-3 fw-bold text-success">₡[[${#numbers.formatDecimal(s.precio, 0, 'POINT', 0, 'POINT')}]]</td>
                                    
                                    <td class="py-3">
                                        <a th:href="@{/admin/servicio/modificar/{id}(id=${s.idServicio})}" class="btn btn-outline-primary btn-sm rounded-pill me-2">
                                            <i class="fas fa-edit"></i> Editar
                                        </a>
                                        <a th:href="@{/admin/servicio/eliminar/{id}(id=${s.idServicio})}" class="btn btn-outline-danger btn-sm rounded-pill" onclick="return confirm('¿Seguro que deseas eliminar este servicio?');">
                                            <i class="fas fa-trash-alt"></i> Eliminar
                                        </a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        
                        <div th:if="${servicios == null or servicios.empty}" class="p-5 text-center text-muted">
                            <i class="fas fa-folder-open fa-3x mb-3"></i>
                            <h4>No hay servicios registrados.</h4>
                        </div>

                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="~{sesionIniciada/fragmentos :: footer}"></footer>

        <div th:if="${mensaje != null}">
            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
            <script th:inline="javascript">
                Swal.fire({ title: '¡Éxito!', text: [[${mensaje}]], icon: 'success', confirmButtonColor: '#2b3a4a' });
            </script>
        </div>

    </body>
</html>
