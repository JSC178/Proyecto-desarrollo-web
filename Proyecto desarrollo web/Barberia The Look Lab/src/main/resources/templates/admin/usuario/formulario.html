<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">

    <head th:replace="~{general/fragmentos :: head}"></head>

    <body style="background-color: var(--marfil);">

        <header th:replace="~{sesionIniciada/fragmentos :: header}"></header>

        <main class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    
                    <div class="card shadow border-0" style="border-radius: 15px;">
                        <div class="card-header text-center text-white p-4" style="background-color: var(--azul-petroleo); border-radius: 15px 15px 0 0;">
                            <h3 class="mb-0 fw-bold"><i class="fas fa-user-edit me-2"></i> Datos del Usuario</h3>
                        </div>
                        
                        <div class="card-body p-5">
                            
                            <form th:action="@{/admin/usuario/guardar}" th:object="${usuario}" method="POST">
                                
                                <input type="hidden" th:field="*{idUsuario}"/>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="username" class="form-label fw-bold" style="color: var(--azul-petroleo);">Nombre de Usuario</label>
                                        <input type="text" class="form-control" id="username" th:field="*{username}" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="password" class="form-label fw-bold" style="color: var(--azul-petroleo);">Contraseña</label>
                                        <input type="password" class="form-control" id="password" th:field="*{password}" placeholder="Escribe para cambiar (Opcional en edición)">
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="nombre" class="form-label fw-bold" style="color: var(--azul-petroleo);">Nombre</label>
                                        <input type="text" class="form-control" id="nombre" th:field="*{nombre}" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="apellidos" class="form-label fw-bold" style="color: var(--azul-petroleo);">Apellidos</label>
                                        <input type="text" class="form-control" id="apellidos" th:field="*{apellidos}" required>
                                    </div>
                                </div>

                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="correo" class="form-label fw-bold" style="color: var(--azul-petroleo);">Correo Electrónico</label>
                                        <input type="email" class="form-control" id="correo" th:field="*{correo}" required>
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="telefono" class="form-label fw-bold" style="color: var(--azul-petroleo);">Teléfono</label>
                                        <input type="text" class="form-control" id="telefono" th:field="*{telefono}">
                                    </div>
                                </div>

                                <div class="row mb-4 p-3 bg-light rounded">
                                    <div class="col-md-6 mb-3 mb-md-0">
                                        <label for="rol" class="form-label fw-bold" style="color: var(--azul-petroleo);">
                                            <i class="fas fa-id-badge me-1"></i> Rol en el Sistema
                                        </label>
                                        <select class="form-select" id="rol" th:field="*{rol}">
                                            <option value="ROLE_USER">Cliente</option>
                                            <option value="ROLE_ADMIN">Administrador</option>
                                        </select>
                                    </div>
                                    <div class="col-md-6 d-flex align-items-center justify-content-start justify-content-md-center">
                                        <div class="form-check form-switch fs-5">
                                            <input class="form-check-input" type="checkbox" id="activo" th:field="*{activo}">
                                            <label class="form-check-label fw-bold ms-2" for="activo" style="color: var(--azul-petroleo);">Usuario Activo</label>
                                        </div>
                                    </div>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="submit" class="btn text-white fw-bold shadow-sm" style="background-color: var(--terracota);">
                                        <i class="fas fa-save me-2"></i> Guardar Usuario
                                    </button>
                                    <a th:href="@{/admin/usuario/listado}" class="btn btn-outline-secondary fw-bold">
                                        Cancelar
                                    </a>
                                </div>

                            </form>

                        </div>
                    </div>

                </div>
            </div>
        </main>

        <footer th:replace="~{sesionIniciada/fragmentos :: footer}"></footer>

    </body>
</html>
