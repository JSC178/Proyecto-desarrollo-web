<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">

    <head th:replace="~{sesionIniciada/fragmentos :: head}"></head>

    <body style="background-color: var(--marfil);">

        <header th:replace="~{sesionIniciada/fragmentos :: header}"></header>

        <main class="container py-5">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold" style="color: var(--azul-petroleo);">
                    <i class="fas fa-users-cog me-2"></i> Gestión de Usuarios
                </h2>
                <a th:href="@{/admin/usuario/nuevo}" class="btn text-white fw-bold shadow-sm" style="background-color: var(--terracota);">
                    <i class="fas fa-user-plus me-1"></i> Nuevo Usuario
                </a>
            </div>

            <div class="card shadow-sm border-0" style="border-radius: 15px;">
                <div class="card-body p-0">
                    <div class="table-responsive">

                        <table class="table table-hover align-middle mb-0 text-center">
                            <thead class="text-white" style="background-color: var(--azul-petroleo);">
                                <tr>
                                    <th class="py-3 px-4">Usuario</th>
                                    <th class="py-3 px-4">Nombre Completo</th>
                                    <th class="py-3 px-4">Correo</th>
                                    <th class="py-3 px-4">Rol</th> <th class="py-3 px-4">Estado</th>
                                    <th class="py-3 px-4">Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="u : ${usuarios}">
                                    <td class="py-3 fw-bold" th:text="${u.username}"></td>
                                    <td class="py-3" th:text="${u.nombre + ' ' + u.apellidos}"></td>
                                    <td class="py-3" th:text="${u.correo}"></td>

                                    <td class="py-3">
                                        <span th:text="${u.username == 'admin' ? 'Administrador' : 'Cliente'}"
                                              class="badge rounded-pill shadow-sm"
                                              th:classappend="${u.username == 'admin'} ? 'bg-primary' : 'bg-secondary'"
                                              style="min-width: 100px;">
                                        </span>
                                    </td>

                                    <td class="py-3">
                                        <span class="badge rounded-pill" 
                                              th:classappend="${u.activo} ? 'bg-success' : 'bg-danger'"
                                              th:text="${u.activo} ? 'Activo' : 'Inactivo'">
                                        </span>
                                    </td>

                                    <td class="py-3">
                                        <a th:href="@{/admin/usuario/modificar/{id}(id=${u.idUsuario})}" 
                                           class="btn btn-outline-primary btn-sm rounded-pill me-2">
                                            <i class="fas fa-edit"></i> Editar
                                        </a>

                                        <a th:if="${u.username != 'admin'}"
                                           th:href="@{/admin/usuario/eliminar/{id}(id=${u.idUsuario})}" 
                                           class="btn btn-outline-danger btn-sm rounded-pill" 
                                           onclick="return confirm('¿Seguro que deseas eliminar este usuario?');">
                                            <i class="fas fa-trash-alt"></i> Eliminar
                                        </a>
                                        <span th:if="${u.username == 'admin'}" class="text-muted small">Protegido</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>

                        <div th:if="${usuarios == null or usuarios.empty}" class="p-5 text-center text-muted">
                            <i class="fas fa-users-slash fa-3x mb-3"></i>
                            <h4>No hay usuarios registrados en el sistema.</h4>
                        </div>

                    </div>
                </div>
            </div>
        </main>

        <footer th:replace="~{sesionIniciada/fragmentos :: footer}"></footer>

        <div th:if="${mensaje != null}">
            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
            <script th:inline="javascript">
                                               Swal.fire({
                                                   title: '¡Operación Exitosa!',
                                                   text: [[${mensaje}]],
                                                   icon: 'success',
                                                   confirmButtonColor: '#2b3a4a'
                                               });
            </script>
        </div>

    </body>
</html>
