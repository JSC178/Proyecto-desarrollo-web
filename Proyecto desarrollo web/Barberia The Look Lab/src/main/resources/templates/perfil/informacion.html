<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6">
<head th:replace="~{general/fragmentos :: head}">
    <title>Mi Perfil</title>
</head>
<body>
    <header th:replace="~{general/fragmentos :: header}"></header>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card">
                    <div class="card-header bg-dark text-white text-center">
                        <h3>Mi Perfil</h3>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/perfil/guardar}" th:object="${usuario}" method="POST">
                            <input type="hidden" name="idUsuario" th:field="*{idUsuario}" />
                            
                            <div class="mb-3">
                                <label class="form-label">Nombre de Usuario (No editable)</label>
                                <input type="text" class="form-control" th:field="*{username}" readonly />
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Nombre</label>
                                <input type="text" class="form-control" th:field="*{nombre}" required />
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Apellidos</label>
                                <input type="text" class="form-control" th:field="*{apellidos}" required />
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control" th:field="*{correo}" required />
                            </div>
                            
                            <div class="mb-3">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" class="form-control" th:field="*{telefono}" />
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">Guardar Cambios</button>
                                <a th:href="@{/perfil/historial}" class="btn btn-info text-white">Ver mi Historial</a>
                            </div>
                        </form>
                    </div>
                    <div class="card-footer text-center">
                        <form th:action="@{/perfil/eliminar}" method="POST" 
                              onsubmit="return confirm('¿Estás seguro de que deseas eliminar tu cuenta? Esta acción no se puede deshacer.');">
                            <input type="hidden" name="idUsuario" th:value="${usuario.idUsuario}" />
                            <button type="submit" class="btn btn-danger btn-sm">Eliminar mi cuenta definitivamente</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{general/fragmentos :: footer}"></footer>
</body>
</html>
