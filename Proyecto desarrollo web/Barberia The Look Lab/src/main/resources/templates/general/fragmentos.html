<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
    <head th:fragment="head">
        <title>Barbería</title>
        <meta charset="UTF-8"/>

        <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
        <script th:src="@{/webjars/jquery/jquery.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    </head>

    <body>
        <header th:fragment="header" class="header">
            <nav class="navbar navbar-expand-sm p-0 bg-light">
                <div class="container">
                    <a th:href="@{/}" class="navbar-brand">[[#{aplicacion.titulo}]]</a>

                    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse justify-content-between" id="navbarCollapse">
                        <ul class="navbar-nav">
                            <li class="nav-item px-2">
                                <a class="nav-link" th:href="@{/}">[[#{plantilla.inicio}]]</a>
                            </li>
                            <li class="nav-item px-2">
                                <a class="nav-link" th:href="@{/servicios}">[[#{plantilla.servicios}]]</a>
                            </li>
                            <li class="nav-item px-2">
                                <a class="nav-link" th:href="@{/cita/agendar}">[[#{plantilla.agendar}]]</a>
                            </li>
                            <li class="nav-item px-2">
                                <a class="nav-link" th:href="@{/cita/historial}">[[#{plantilla.historial}]]</a>
                            </li>
                        </ul>

                        <ul class="navbar-nav">
                            <li class="nav-item dropdown">
                                <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button">
                                    [[#{plantilla.idioma}]]
                                </a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" th:href="@{/(lang=es)}">Español</a></li>
                                    <li><a class="dropdown-item" th:href="@{/(lang=en)}">English</a></li>
                                </ul>
                            </li>
                        </ul>
                    </div>

                </div>
            </nav>
        </header>

        <footer th:fragment="footer" class="p-2 mt-5 bg-dark text-white">
            <p class="lead text-center m-0">[[#{plantilla.derechos}]] &COPY;</p>
        </footer>
    </body>
</html>
