<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity6"> <head th:fragment="head">
        <title>The Look Lab</title>
        <meta charset="UTF-8"/>

        <link th:href="@{/webjars/font-awesome/6.5.1/css/all.css}" rel="stylesheet"/>
        <link th:href="@{/webjars/bootstrap/5.3.2/css/bootstrap.min.css}" rel="stylesheet"/>
        <script th:src="@{/webjars/jquery/3.7.1/jquery.min.js}"></script>
        <script th:src="@{/webjars/bootstrap/5.3.2/js/bootstrap.bundle.min.js}"></script>

        <link th:href="@{/css/estilos.css?v=3}" rel="stylesheet"/>
    </head>

    <body>
        <header th:fragment="header" class="header">
            <nav class="navbar navbar-expand-lg p-3 shadow-sm">
                <div class="container">

                    <a th:href="@{/}" class="navbar-brand fw-bold text-uppercase d-flex align-items-center">
                        <img th:src="@{/img/logo.png}" alt="Logo" width="45" height="45"
                             class="me-2 rounded-circle shadow-sm" style="object-fit: cover;">
                            [[#{aplicacion.titulo}]]
                    </a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarCollapse">
                        <ul class="navbar-nav mx-auto">
                            <li class="nav-item px-2">
                                <a class="nav-link" th:href="@{/}">[[#{plantilla.inicio}]]</a>
                            </li>
                            <li class="nav-item px-2">
                                <a class="nav-link" th:href="@{/servicio/listado}">[[#{plantilla.servicios}]]</a>
                            </li>
                            <li class="nav-item px-2">
                                <a class="nav-link" th:href="@{/cita/agendar}">[[#{plantilla.agendar}]]</a>
                            </li>
                        </ul>

                        <ul class="navbar-nav align-items-center">

                            <li class="nav-item dropdown me-3">
                                <a class="nav-link dropdown-toggle" data-bs-toggle="dropdown" href="#" role="button">
                                    <i class="fas fa-globe"></i> [[#{plantilla.idioma}]]
                                </a>
                                <ul class="dropdown-menu">
                                    <li><a class="dropdown-item" th:href="@{/(lang=es)}">Español</a></li>
                                    <li><a class="dropdown-item" th:href="@{/(lang=en)}">English</a></li>
                                </ul>
                            </li>

                            <li class="nav-item" sec:authorize="!isAuthenticated()">
                                <a class="btn btn-outline-dark" th:href="@{/login}">
                                    <i class="fas fa-user me-1"></i> [[#{plantilla.iniciar_sesion}]]
                                </a>
                            </li>

                            <li class="nav-item d-flex align-items-center" sec:authorize="isAuthenticated()">

                                <a href="#" class="nav-link me-3 d-flex align-items-center text-dark" title="Perfil de Usuario">
                                    <i class="fas fa-user-circle fa-2x me-2" style="color: var(--azul-petroleo);"></i>
                                    <span class="fw-bold" sec:authentication="name">Usuario</span>
                                </a>

                                <form th:action="@{/logout}" method="POST" class="m-0">
                                    <button type="submit" class="btn btn-danger btn-sm px-3 shadow-sm rounded-pill">
                                        <i class="fas fa-sign-out-alt me-1"></i> Cerrar Sesión
                                    </button>
                                </form>

                            </li>

                        </ul>
                    </div>
                </div>
            </nav>
        </header>

        <footer th:fragment="footer" class="p-4 mt-5 bg-dark text-white">
            <div class="container text-center">
                <p class="lead m-0">[[#{plantilla.derechos}]]</p>
            </div>
        </footer>
    </body>
</html>
